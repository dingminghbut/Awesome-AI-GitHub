name: Daily AI Project Update

on:
  schedule:
    - cron: "20 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update project data
        run: npm run update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build README and Pages
        run: npm run build

      - name: Check generated output
        run: npm run check

      - name: Commit daily update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md README.zh-CN.md METHODOLOGY.md METHODOLOGY.zh-CN.md CONTRIBUTING.md reports docs data package-lock.json package.json tsconfig.json src .github .gitignore .gitattributes LICENSE
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update AI project rankings"
            git push
          fi
